workflows:
  ios-workflow:
    name: iOS Workflow - Clean Setup
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: code_magic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aareadingsandprayers.aaReadings25
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
    scripts:
      - name: Set up environment
        script: |
          echo "Flutter version:"
          flutter --version
          echo "Xcode version:"
          xcodebuild -version
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Verify code signing
        script: |
          echo "=== Code Signing Verification ==="
          echo "Available certificates:"
          security find-identity -v -p codesigning
          echo "Available provisioning profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles directory"
          echo "Checking for specific certificate types:"
          security find-identity -v -p codesigning | grep -i "Apple Distribution" || echo "No Apple Distribution found"
          security find-identity -v -p codesigning | grep -i "Apple Development" || echo "No Apple Development found"
      - name: Build IPA
        script: |
          # Set environment variables for code signing
          export DEVELOPMENT_TEAM="25X2WSWQG6"
          export CODE_SIGN_IDENTITY="Apple Distribution: Colin Differ (25X2WSWQG6)"
          
          # Build without code signing first, let Codemagic handle signing
          flutter build ios --release --no-codesign \
            --build-name=8.1.1 \
            --build-number=11
          
          # Then create IPA with Codemagic's code signing
          flutter build ipa --release \
            --build-name=8.1.1 \
            --build-number=11 \
            --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - colindiffer@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
