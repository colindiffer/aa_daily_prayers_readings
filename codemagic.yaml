workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: code_magic
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aareadingsandprayers.aaReadings25
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        FCI_CERTIFICATE: aa_readings_prod_cert
        FCI_PROVISIONING_PROFILE: AAReadingsAppStore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
    scripts:
      - name: Set up environment
        script: |
          flutter --version
          xcodebuild -version
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          echo "=== Attempting to build iOS app with manual certificate handling ==="
          
          # First, try to build without code signing to see if the issue is with the app itself
          echo "Step 1: Building without code signing..."
          flutter build ios --release --no-codesign --verbose
          
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "❌ Failed to build Runner.app - this is not a signing issue"
            exit 1
          fi
          
          echo "✅ Runner.app built successfully without signing"
          echo "Step 2: Checking available certificates again..."
          security find-identity -v -p codesigning
          
          echo "Step 3: Attempting to build IPA with signing..."
          flutter build ipa --release \
            --build-name=8.1.1 \
            --build-number=11 \
            --verbose
      - name: Debug code signing setup
        script: |
          echo "=== Code Signing Debug ==="
          echo "Distribution type: app_store"
          echo "Bundle ID: com.aareadingsandprayers.aaReadings25"
          echo "Available certificates in keychain:"
          security find-identity -v -p codesigning || echo "No certificates in keychain"
          echo "Available provisioning profiles:"
          find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -10 || echo "No provisioning profiles found"
          echo "Codemagic environment variables:"
          env | grep -E "(CERTIFICATE|PROFILE|SIGNING)" | sort || echo "No signing environment variables"
          echo "Attempting to list all environment variables containing 'CM':"
          env | grep CM | sort || echo "No CM variables"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - colindiffer@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
